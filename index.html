<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СберКонтроль АИ | Управление проектом</title>
    <style>
        :root {
            --sber-green: #21A038;
            --sber-green-light: #E6F4EA;
            --sber-green-dark: #1A8330;
            --sber-gray: #F5F7FA;
            --sber-text: #333333;
            --sber-text-light: #6B7280;
            --sber-white: #FFFFFF;
            --sber-border: #E5E7EB;
            --sber-red: #EF4444;
            --sber-yellow: #F59E0B;
            --sber-blue: #3B82F6;
            --sber-orange: #F97316;
            --priority-1: #EF4444;
            --priority-2: #F59E0B;
            --priority-3: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sber-gray);
            color: var(--sber-text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: var(--sber-white);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
        }

        /* Шапка */
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--sber-green);
        }
        .logo-area { display: flex; align-items: center; gap: 16px; }
        .sber-logo {
            width: 48px; height: 48px;
            background: var(--sber-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }
        .sber-logo::after { content: "С"; font-family: serif; }
        .user-badge {
            background: var(--sber-green-light);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--sber-green-dark);
            font-weight: 600;
        }

        /* Переключатель языка */
        .lang-switcher {
            display: flex;
            background: var(--sber-gray);
            border-radius: 20px;
            padding: 4px;
            gap: 4px;
        }
        .lang-btn {
            background: transparent;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--sber-text-light);
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: var(--sber-green);
            color: white;
        }
        .lang-btn:hover:not(.active) {
            color: var(--sber-green);
        }

        /* Синхронизация */
        .sync-panel {
            background: linear-gradient(135deg, var(--sber-green-light), white);
            border: 2px solid var(--sber-green);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-indicator {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--sber-green);
            display: inline-block;
            margin-right: 8px;
        }
        .sync-indicator.error { background: var(--sber-red); }
        .sync-indicator.warning { background: var(--sber-yellow); animation: pulse 2s infinite; }
        .sync-indicator.syncing { background: var(--sber-yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--sber-gray);
            padding: 8px;
            border-radius: 12px;
        }
        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--sber-text-light);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .tab:hover { background: rgba(33, 160, 56, 0.1); color: var(--sber-green); }
        .tab.active { background: var(--sber-green); color: white; }
        .tab-badge {
            background: var(--sber-red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Карточки */
        .card {
            background: var(--sber-white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--sber-border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--sber-border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-title {
            color: var(--sber-text);
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-primary { background: var(--sber-green); color: white; }
        .btn-primary:hover { background: var(--sber-green-dark); }
        .btn-secondary { background: var(--sber-gray); color: var(--sber-text); border: 1px solid var(--sber-border); }
        .btn-danger { background: #FEE2E2; color: var(--sber-red); }
        .btn-export { background: #DBEAFE; color: #1E40AF; border: 1px solid #3B82F6; }
        .btn-export:hover { background: #3B82F6; color: white; }

        /* Таблицы */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .data-table th {
            background: var(--sber-green-light);
            color: var(--sber-green-dark);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--sber-green);
            font-weight: 600;
        }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--sber-border); vertical-align: top; }
        .data-table tr:hover { background: var(--sber-gray); }

        /* Формы */
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--sber-border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9em;
            background: var(--sber-white);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--sber-green);
            box-shadow: 0 0 0 3px rgba(33, 160, 56, 0.1);
        }
        .form-textarea { min-height: 60px; resize: vertical; }

        /* Прогресс */
        .progress-container {
            height: 24px;
            background: var(--sber-gray);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--sber-green), var(--sber-green-dark));
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.8em;
        }

        /* Бейджи */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
            display: inline-block;
        }
        .badge-success { background: var(--sber-green-light); color: var(--sber-green-dark); }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-info { background: #DBEAFE; color: #1E40AF; }
        .badge-hold { background: #FEE2E2; color: #991B1B; font-weight: 600; border: 2px solid var(--sber-red); }

        /* Группировка MDR с чекбоксом */
        .mdr-contractor-group {
            margin-bottom: 16px;
            border: 1px solid var(--sber-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .mdr-contractor-header {
            background: var(--sber-green);
            color: white;
            padding: 12px 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .mdr-contractor-header:hover { background: var(--sber-green-dark); }
        .mdr-contractor-content {
            display: none;
            padding: 12px;
        }
        .mdr-contractor-content.expanded { display: block; }
        .toggle-icon { font-size: 1.2em; transition: transform 0.3s; }
        .toggle-icon.expanded { transform: rotate(90deg); }

        /* Контактная карточка подрядчика */
        .contact-card {
            background: linear-gradient(135deg, var(--sber-green-light), white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--sber-green);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        .contact-avatar {
            width: 60px; height: 60px;
            background: var(--sber-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .zones-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .zone-tag {
            background: white;
            border: 1px solid var(--sber-green);
            color: var(--sber-green-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        /* Отчет по контрольным датам */
        .weekly-report {
            background: var(--sber-green-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--sber-green);
        }
        .weekly-report h3 {
            margin-bottom: 16px;
            color: var(--sber-green-dark);
        }
        .date-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sber-green);
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--sber-text-light);
        }

        /* Фильтры */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Статистика дашборда */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--sber-white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--sber-border);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--sber-green);
            margin: 10px 0;
        }
        .stat-label {
            color: var(--sber-text-light);
            font-size: 0.9em;
        }

        /* Комплект в карточке подрядчика */
        .doc-card {
            border: 1px solid var(--sber-border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: white;
        }
        .doc-card.hold { background: #FEF2F2; border-color: var(--sber-red); }
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        .doc-title { font-weight: 600; margin-bottom: 4px; }
        .doc-code {
            font-family: monospace;
            color: var(--sber-text-light);
            font-size: 0.85em;
        }

        /* Уровни готовности в отчете */
        .level-30 { background: var(--sber-orange) !important; }
        .level-60 { background: var(--sber-yellow) !important; color: #333 !important; }
        .level-90 { background: var(--sber-green) !important; }

        /* Поиск */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            padding-right: 30px;
        }
        .search-clear {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--sber-text-light);
            font-size: 1.2em;
        }

        /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .container { padding: 12px; border-radius: 12px; }
            
            .main-header { 
                flex-direction: column; 
                gap: 12px; 
                text-align: center;
            }
            .main-header h1 { font-size: 1.2em; }
            
            .sync-panel { 
                flex-direction: column; 
                gap: 12px;
                text-align: center;
            }
            
            .tabs { 
                flex-direction: column; 
                gap: 4px;
            }
            .tab { 
                width: 100%; 
                justify-content: center;
                padding: 10px;
            }
            
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-value { font-size: 1.8em; }
            
            .contact-card { 
                grid-template-columns: 1fr; 
                text-align: center;
                gap: 12px;
            }
            .contact-avatar { margin: 0 auto; }
            .zones-list { justify-content: center; }
            
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar > * { width: 100% !important; max-width: none !important; }
            
            .data-table { font-size: 0.75em; }
            .data-table th, .data-table td { padding: 8px 4px; }
            
            .doc-card > div[style*="grid-template-columns"] {
                grid-template-columns: 1fr 1fr !important;
            }
            
            .weekly-report .date-selector { flex-direction: column; align-items: stretch; }
            
            .modal { 
                width: 95%; 
                padding: 16px; 
                margin: 10px;
                max-height: 95vh;
            }
            .form-row[style*="grid-template-columns"] {
                grid-template-columns: 1fr !important;
            }
            
            .card-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .lang-switcher {
                order: -1;
                margin-bottom: 8px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .sber-logo { width: 40px; height: 40px; font-size: 20px; }
            .tab { font-size: 0.9em; padding: 8px 12px; }
            .btn { padding: 8px 12px; font-size: 0.85em; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Модальное окно изменений -->
    <div id="changeModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">📝 Редактирование записи</div>
                <button class="close-btn" onclick="closeChangeModal()">&times;</button>
            </div>
            <form id="changeForm" onsubmit="saveChange(event)">
                <input type="hidden" id="changeId">
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>№ записи</label>
                        <input type="number" id="changeNumber" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="changeCategory" class="form-select">
                            <option value="Сроки">Сроки</option>
                            <option value="Ресурсы">Ресурсы</option>
                            <option value="Бюджет">Бюджет</option>
                            <option value="Объем">Объем</option>
                            <option value="Качество">Качество</option>
                            <option value="Требования">Требования</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Элемент/Комплект</label>
                    <input type="text" id="changeElement" class="form-input">
                </div>
                <div class="form-group">
                    <label>Описание изменения</label>
                    <textarea id="changeDescription" class="form-textarea" required></textarea>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Инициатор</label>
                        <input type="text" id="changeInitiator" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Дата запроса</label>
                        <input type="date" id="changeRequestDate" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="changeStatus" class="form-select">
                        <option value="На рассмотрении">На рассмотрении</option>
                        <option value="Внесено">Внесено</option>
                        <option value="Одобрено">Одобрено</option>
                        <option value="Отклонено">Отклонено</option>
                        <option value="Отложено">Отложено</option>
                    </select>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Решение принял</label>
                        <input type="text" id="changeDecisionMaker" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Дата решения</label>
                        <input type="date" id="changeDecisionDate" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label>Решение/Комментарий</label>
                    <textarea id="changeDecision" class="form-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label>Комментарии</label>
                    <textarea id="changeComments" class="form-textarea" placeholder="Дополнительные комментарии..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeChangeModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно проблемы -->
    <div id="issueModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">⚠️ Новая проблема</div>
                <button class="close-btn" onclick="closeIssueModal()">&times;</button>
            </div>
            <form id="issueForm" onsubmit="saveIssue(event)">
                <input type="hidden" id="issueContractorId">
                <input type="hidden" id="issueDocCode">
                <input type="hidden" id="issueDocName">
                
                <div class="form-group">
                    <label>ID проблемы</label>
                    <input type="text" id="issueId" class="form-input" readonly style="background: var(--sber-gray);">
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Подрядчик</label>
                        <input type="text" id="issueContractorName" class="form-input" readonly style="background: var(--sber-gray);">
                    </div>
                    <div class="form-group">
                        <label>Классификатор</label>
                        <select id="issueClassifier" class="form-select" required>
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Влияет на комплект</label>
                    <input type="text" id="issueAffectedDoc" class="form-input" readonly style="background: var(--sber-gray);">
                </div>
                
                <div class="form-group">
                    <label>Описание проблемы</label>
                    <textarea id="issueDesc" class="form-textarea" required></textarea>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Дата выявления</label>
                        <input type="date" id="issueDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Срок решения</label>
                        <input type="date" id="issueDueDate" class="form-input" required>
                    </div>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="issueStatus" class="form-select">
                            <option value="Новая">Новая</option>
                            <option value="В работе">В работе</option>
                            <option value="Требует решения">Требует решения</option>
                            <option value="На согласовании">На согласовании</option>
                            <option value="Решено">Решено</option>
                            <option value="Отменено">Отменено</option>
                            <option value="Отложено">Отложено</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Приоритет</label>
                        <select id="issuePriority" class="form-select">
                            <option value="Критический">🔴 Критический</option>
                            <option value="Высокий">🟡 Высокий</option>
                            <option value="Средний" selected>🟢 Средний</option>
                            <option value="Низкий">🔵 Низкий</option>
                        </select>
                    </div>

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                await loadMDRFromSheets(controller.signal);
                clearTimeout(timeoutId);
                
                lastSync = new Date();
                updateSyncStatus('ok', (currentLang === 'ru' ? 'Синхронизировано: ' : 'Synced: ') + lastSync.toLocaleTimeString(currentLang === 'ru' ? 'ru-RU' : 'en-US'));
                render();
                
            } catch (error) {
                console.error('Sync error:', error);
                syncError = error.message;
                
                if (error.name === 'AbortError' || error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    updateSyncStatus('warning', t('messages.offlineMode'));
                    loadDemoData();
                    render();
                } else {
                    updateSyncStatus('error', 'Error: ' + error.message);
                    loadDemoData();
                    render();
                }
            }

        async function loadMDRFromSheets(signal) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${CONFIG.MDR_RANGE}?key=${CONFIG.API_KEY}`;
            
            const response = await fetch(url, { signal });
            if (!response.ok) {
                if (response.status === 403) throw new Error(currentLang === 'ru' ? 'Доступ запрещен' : 'Access denied');
                if (response.status === 404) throw new Error(currentLang === 'ru' ? 'Таблица не найдена' : 'Table not found');
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            const rows = data.values || [];
            
            if (rows.length < 3) throw new Error(currentLang === 'ru' ? 'Недостаточно данных' : 'Insufficient data');

            mdrData = [];
            aiDocs = [];
            
            for (let i = 2; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                
                const zone = (row[0] || '').toString().trim();
                const discipline = (row[1] || '').toString().trim();
                const docCode = (row[4] || '').toString().trim();
                const docName = (row[5] || '').toString().trim();
                const intermediateStatus = row[11] ? row[11].toString().trim() : '';
                const finalStatus = row[12] ? row[12].toString().trim() : '';
                
                const isAI = discipline.toUpperCase().includes('АИ') || 
                             discipline.toUpperCase().includes('AI') ||
                             docCode.toUpperCase().includes('АИ') ||
                             docCode.toUpperCase().includes('AI');
                
                const contractor = findContractor(zone);
                
                const doc = {
                    id: i,
                    zone: zone,
                    discipline: discipline,
                    docCode: docCode,
                    docName: docName,
                    intermediateStatus: intermediateStatus,
                    finalStatus: finalStatus,
                    contractorId: contractor?.id,
                    contractorName: contractor?.name || (currentLang === 'ru' ? 'Не определен' : 'Undefined'),
                    isAI: isAI
                };
                
                mdrData.push(doc);
                
                if (isAI && contractor) {
                    aiDocs.push(doc);
                }
            }
            
            if (aiDocs.length === 0) loadDemoAIDocs();
        }

                        <div>
                            <button class="btn btn-secondary" onclick="resetDashboardFilters()" style="height: fit-content;">${t('buttons.clear')}</button>
                        </div>
                    </div>

                    <div class="stats-grid" style="margin-top: 20px;">
                        ${Object.entries(statusStats).length > 0 ? Object.entries(statusStats).map(([status, count]) => `
                            <div class="stat-card">
                                <div class="stat-label">${status}</div>
                                <div class="stat-value" style="${getStatusColor(status)}">${count}</div>
                                <div class="stat-label">${currentLang === 'ru' ? 'комплектов' : 'documents'}</div>
                            </div>
                        `).join('') : `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--sber-text-light);">${t('messages.noData')}</div>`}
                    </div>

                    <div class="card" style="margin-top: 20px;">
                        <div class="card-header">
                            <div class="card-title">📈 ${currentLang === 'ru' ? 'Распределение по подрядчикам АИ' : 'AI Contractors Distribution'} ${(disciplineFilter !== 'all' || docCodeFilter !== 'all') ? (currentLang === 'ru' ? '(отфильтровано)' : '(filtered)') : ''}</div>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>${t('table.contractor')}</th>
                                    <th>${currentLang === 'ru' ? 'Кол-во комплектов' : 'Documents count'}</th>
                                    <th>${t('table.progress')}</th>
                                    <th>HOLD</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${contractorStats.map(c => `
                                    <tr>
                                        <td><strong>${c.name}</strong></td>
                                        <td>${c.docs.length}</td>
                                        <td>
                                            <div class="progress-container" style="height: 20px; width: 150px;">
                                                <div class="progress-bar" style="width: ${c.avgProgress}%">${c.avgProgress}%</div>
                                            </div>
                                        </td>
                                        <td>${c.holdCount > 0 ? `<span class="badge badge-hold">${c.holdCount} HOLD</span>` : '—'}</td>
                                    </tr>
                                `).join('') || `<tr><td colspan="4" style="text-align: center;">${t('messages.noData')}</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function getStatusColor(status) {
            if (status.includes('согласован') || status.includes('выпущен') || status.includes('Approved') || status.includes('Released')) return 'color: var(--sber-green);';
            if (status.includes('работе') || status.includes('Progress')) return 'color: var(--sber-blue);';
            if (status.includes('доработк') || status.includes('Revision')) return 'color: var(--sber-yellow);';
            return 'color: var(--sber-text);';
        }

        // ========== 2. ВСЕ MDR ==========
        function renderAllMDR() {
            const byContractor = {};
            
            CONTRACTORS.forEach(c => {
                byContractor[c.name] = aiDocs.filter(d => d.contractorId === c.id);
            });
            
            const otherDocs = mdrData.filter(d => !d.isAI || !d.contractorId);
            if (otherDocs.length > 0) {
                byContractor[currentLang === 'ru' ? 'Прочие разделы' : 'Other disciplines'] = otherDocs.map(d => ({...d, isOther: true}));
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📋 ${currentLang === 'ru' ? 'Полный реестр MDR' : 'Full MDR Registry'}</div>
                        <button class="btn btn-secondary" onclick="exportMDR()">📊 Excel</button>
                    </div>
                    
                    ${Object.entries(byContractor).map(([contractorName, docs]) => {
                        const isExpanded = expandedContractors.has(contractorName);
                        const avgProgress = docs.filter(d => !d.isOther).length > 0
                            ? Math.round(docs.filter(d => !d.isOther).reduce((sum, d) => sum + (getDocProgress(d.id) || 0), 0) / docs.filter(d => !d.isOther).length)
                            : 0;
                        
                        return `
                            <div class="mdr-contractor-group">
                                <div class="mdr-contractor-header" onclick="toggleContractor('${contractorName}')">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <input type="checkbox" ${isExpanded ? 'checked' : ''} onclick="event.stopPropagation(); toggleContractor('${contractorName}')" style="width: 18px; height: 18px;">
                                        <span>👷 ${contractorName}</span>
                                        <span class="badge badge-info">${docs.length} ${currentLang === 'ru' ? 'компл.' : 'docs'}</span>
                                        ${!docs[0]?.isOther ? `<span class="badge badge-success">${currentLang === 'ru' ? 'Средний прогресс' : 'Avg progress'}: ${avgProgress}%</span>` : ''}
                                    </div>
                                    <span class="toggle-icon ${isExpanded ? 'expanded' : ''}">▶</span>
                                </div>
                                <div class="mdr-contractor-content ${isExpanded ? 'expanded' : ''}">
                                    <table class="data-table" style="font-size: 0.85em;">
                                        <thead>
                                            <tr>
                                                <th>${t('table.discipline')}</th>
                                                <th>${t('table.docCode')}</th>
                                                <th>${t('table.name')}</th>
                                                <th>${currentLang === 'ru' ? 'Плановая дата (90%)' : 'Plan date (90%)'}</th>
                                                <th>${t('table.progress')}</th>
                                                <th>${t('table.status')}</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${docs.map(d => {
                                                const settings = d.contractorId ? contractorSettings[d.contractorId]?.docs[d.id] : null;
                                                const planDate = settings?.plan90 || d.plan90 || '—';
                                                const progress = getDocProgress(d.id);
                                                const isHold = isDocHold(d.id);
                                                
                                                return `
                                                    <tr class="${isHold ? 'hold' : ''}" style="${isHold ? 'background: #FEF2F2;' : ''}">
                                                        <td style="font-family: monospace;">${d.discipline || '—'}</td>
                                                        <td style="font-family: monospace; font-size: 0.8em;">${d.docCode}</td>
                                                        <td>${d.docName}</td>
                                                        <td>${d.isOther ? '—' : formatDate(planDate)}</td>
                                                        <td>
                                                            ${d.isOther ? '—' : `
                                                                <div class="progress-container" style="height: 20px; width: 80px;">
                                                                    <div class="progress-bar" style="width: ${progress}%">${progress}%</div>
                                                                </div>
                                                            `}
                                                        </td>
                                                        <td>${isHold ? '<span class="badge badge-hold">HOLD</span>' : (d.finalStatus || '—')}</td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function toggleContractor(name) {
            if (expandedContractors.has(name)) {
                expandedContractors.delete(name);
            } else {
                expandedContractors.add(name);
            }
            saveToStorage();
            render();
        }

        // ========== 3-7. СТРАНИЦЫ ПОДРЯДЧИКОВ ==========
        function updateContractorSearchFilter(contractorId, value) {
            if (!contractorSettings[contractorId]) {
                contractorSettings[contractorId] = { docs: {}, weeklyReportDate: new Date().toISOString().split('T')[0] };
            }
            contractorSettings[contractorId].searchFilter = value;
            saveToStorage();
            render();
        }

        function renderContractor(contractorId) {
            const c = CONTRACTORS.find(x => x.id === contractorId);
            const docs = aiDocs.filter(d => d.contractorId === contractorId);
            const contractorIssues = issues.filter(i => i.contractorId === contractorId);
            
            const searchFilter = (contractorSettings[contractorId]?.searchFilter || '').toLowerCase();
            const filteredDocs = searchFilter 
                ? docs.filter(d => d.docCode.toLowerCase().includes(searchFilter))
                : docs;

            const byZone = {};
            filteredDocs.forEach(d => {
                if (!byZone[d.zone]) byZone[d.zone] = [];
                byZone[d.zone].push(d);
            });

            const reportDate = contractorSettings[contractorId]?.weeklyReportDate || new Date().toISOString().split('T')[0];
            const weekLater = new Date(reportDate);
            weekLater.setDate(weekLater.getDate() + 7);
            
            const getUpcomingByLevel = (level) => {
                return filteredDocs.filter(d => {
                    const settings = contractorSettings[contractorId]?.docs[d.id];
                    const planDate = settings?.[`plan${level}`] || d[`plan${level}`];
                    if (!planDate) return false;
                    const plan = new Date(planDate);
                    return plan >= new Date(reportDate) && plan <= weekLater;
                }).sort((a, b) => {
                    const dateA = new Date(contractorSettings[contractorId]?.docs[a.id]?.[`plan${level}`] || a[`plan${level}`]);
                    const dateB = new Date(contractorSettings[contractorId]?.docs[b.id]?.[`plan${level}`] || b[`plan${level}`]);
                    return dateA - dateB;
                });
            };

            const upcoming30 = getUpcomingByLevel(30);
            const upcoming60 = getUpcomingByLevel(60);
            const upcoming90 = getUpcomingByLevel(90);

            const renderLevelTable = (level, docs, colorClass) => `
                <div style="margin-bottom: 24px;">
                    <div class="${colorClass}" style="color: white; padding: 12px 16px; border-radius: 8px 8px 0 0; font-weight: 600; display: flex; justify-content: space-between; align-items: center;">
                        <span>🎯 ${t(`table.level${level}`)} — ${docs.length} ${t('report.count')}</span>
                        <span style="font-size: 0.9em; opacity: 0.9;">${formatDate(reportDate)} — ${formatDate(weekLater.toISOString().split('T')[0])}</span>
                    </div>
                    ${docs.length > 0 ? `
                        <table class="data-table" style="background: white; border-radius: 0 0 8px 8px; margin: 0;">
                            <thead>
                                <tr>
                                    <th>${currentLang === 'ru' ? 'Дата' : 'Date'} ${level}%</th>
                                    <th>${currentLang === 'ru' ? 'Комплект' : 'Document'}</th>
                                    <th>${currentLang === 'ru' ? 'Текущий %' : 'Current %'}</th>
                                    <th>${t('table.status')}</th>
                                    <th>${t('report.action')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${docs.map(d => {
                                    const settings = contractorSettings[contractorId]?.docs[d.id];
                                    const planDate = settings?.[`plan${level}`] || d[`plan${level}`];
                                    const currentProgress = getDocProgress(d.id);
                                    const isHold = isDocHold(d.id);
                                    
                                    return `
                                        <tr style="${isHold ? 'background: #FEF2F2;' : ''}">
                                            <td><strong>${formatDate(planDate)}</strong></td>
                                            <td>
                                                <div style="font-weight: 600;">${d.docName}</div>
                                                <div style="font-size: 0.8em; color: var(--sber-text-light);">${d.docCode}</div>
                                            </td>
                                            <td>
                                                <div class="progress-container" style="height: 24px; width: 100px;">
                                                    <div class="progress-bar" style="width: ${currentProgress}%">${currentProgress}%</div>
                                                </div>
                                            </td>
                                            <td>${isHold ? '<span class="badge badge-hold">HOLD</span>' : '<span class="badge badge-success">В работе</span>'}</td>
                                            <td>
                                                <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.8em;" 
                                                    onclick="addIssueForDoc(${contractorId}, ${d.id}, '${d.docName.replace(/'/g, "\\'")}')">${t('report.addIssue')}</button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    ` : `<div style="background: white; padding: 20px; text-align: center; color: var(--sber-text-light); border-radius: 0 0 8px 8px;">${currentLang === 'ru' ? 'Нет комплектов на этой неделе' : 'No documents this week'}</div>`}
                </div>
            `;

            return `
                <div class="contact-card">
                    <div class="contact-avatar">${c.shortName}</div>
                    <div>
                        <h3>${c.name}</h3>
                        <p>${currentLang === 'ru' ? 'РП' : 'PM'}: ${c.contact}</p>
                        <div class="zones-list">
                            ${c.zones.map(z => `<span class="zone-tag">${z}</span>`).join('')}
                        </div>
                    </div>
                    <div style="text-align: right;">
                        📞 ${c.phone}<br>
                        <span class="badge badge-info">${filteredDocs.length} ${currentLang === 'ru' ? 'из' : 'of'} ${docs.length} ${currentLang === 'ru' ? 'комплектов' : 'docs'}</span>
                        ${searchFilter ? '<br><span class="badge badge-warning">' + (currentLang === 'ru' ? 'Фильтр активен' : 'Filter active') + '</span>' : ''}
                    </div>
                </div>

                <!-- Фильтр поиска -->
                <div class="card" style="background: var(--sber-green-light);">
                    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                        <span style="font-weight: 600;">🔍 ${t('messages.searchDocCode')}:</span>
                        <div class="search-box" style="flex: 1; max-width: 400px;">
                            <input type="text" class="form-input" placeholder="${t('buttons.search')}" 
                                value="${contractorSettings[contractorId]?.searchFilter || ''}"
                                oninput="updateContractorSearchFilter(${contractorId}, this.value)">
                            ${searchFilter ? `<button class="search-clear" onclick="updateContractorSearchFilter(${contractorId}, '')">✕</button>` : ''}
                        </div>
                        <button class="btn btn-export" onclick="exportToMSProject(${contractorId})">📊 ${t('buttons.exportProject')}</button>
                        ${searchFilter ? `<button class="btn btn-secondary" onclick="updateContractorSearchFilter(${contractorId}, '')">${t('buttons.clear')}</button>` : ''}
                    </div>
                </div>

                <!-- Отчет по контрольным датам — 3 уровня -->
                <div class="weekly-report" style="background: linear-gradient(135deg, #f0fdf4, white);">
                    <h3>📅 ${t('report.title')}</h3>
                    <div class="date-selector" style="margin-bottom: 24px;">
                        <label>${t('report.dateFrom')}:</label>
                        <input type="date" class="form-input" value="${reportDate}" 
                            onchange="updateReportDate(${contractorId}, this.value)" style="width: 150px;">
                        <span>${t('report.to')} ${formatDate(weekLater.toISOString().split('T')[0])}</span>
                    </div>
                    
                    ${renderLevelTable(30, upcoming30, 'level-30')}
                    ${renderLevelTable(60, upcoming60, 'level-60')}
                    ${renderLevelTable(90, upcoming90, 'level-90')}
                </div>

                <!-- Все комплекты подрядчика -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📋 ${currentLang === 'ru' ? 'Все комплекты' : 'All documents'} (${filteredDocs.length})</div>
                    </div>
                    
                    ${Object.entries(byZone).map(([zone, zoneDocs]) => `
                        <div style="margin-bottom: 20px;">
                            <div style="background: var(--sber-green-light); padding: 12px; font-weight: 600; border-radius: 8px 8px 0 0;">
                                📁 ${zone} (${zoneDocs.length})
                            </div>
                            <div style="border: 1px solid var(--sber-border); border-top: none; padding: 12px; border-radius: 0 0 8px 8px;">
                                ${zoneDocs.map(d => {
                                    const settings = contractorSettings[contractorId]?.docs[d.id] || {};
                                    const progress = settings.progress || 0;
                                    const isHold = settings.isHold || false;
                                    
                                    return `
                                        <div class="doc-card ${isHold ? 'hold' : ''}">
                                            <div class="doc-header">
                                                <div>
                                                    <div class="doc-title">${d.docName}</div>
                                                    <div class="doc-code">${d.docCode}</div>
                                                </div>
                                                <span class="badge badge-info">${d.tom || 'Том 1'} / ${d.book || 'Книга 1'}</span>
                                            </div>
                                            
                                            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; font-size: 0.85em;">
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">${currentLang === 'ru' ? 'Начало' : 'Start'}</label>
                                                    <input type="date" class="form-input" value="${settings.startDate || d.startDate || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'startDate', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">30% ${currentLang === 'ru' ? 'план' : 'plan'}</label>
                                                    <input type="date" class="form-input" value="${settings.plan30 || d.plan30 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan30', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">60% ${currentLang === 'ru' ? 'план' : 'plan'}</label>
                                                    <input type="date" class="form-input" value="${settings.plan60 || d.plan60 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan60', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">90% ${currentLang === 'ru' ? 'план' : 'plan'}</label>
                                                    <input type="date" class="form-input" value="${settings.plan90 || d.plan90 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan90', this.value)">
                                                </div>
                                            </div>
                                            
                                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; align-items: end;">
                                                <div>
                                                    <label style="color: var(--sber-text-light); font-size: 0.8em; display: block; margin-bottom: 4px;">% ${currentLang === 'ru' ? 'готовности' : 'complete'}</label>
                                                    <input type="number" class="form-input" min="0" max="100" value="${progress}" 
                                                        onchange="updateDocProgress(${contractorId}, ${d.id}, this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); font-size: 0.8em; display: block; margin-bottom: 4px;">${t('table.status')}</label>
                                                    <select class="form-select" onchange="updateDocStatus(${contractorId}, ${d.id}, this.value)">
                                                        <option value="В работе" ${!isHold ? 'selected' : ''}>${currentLang === 'ru' ? 'В работе' : 'In Progress'}</option>
                                                        <option value="HOLD" ${isHold ? 'selected' : ''}>🛑 HOLD</option>
                                                    </select>
                                                </div>
                                                <div></div>
                                                <div>
                                                    <button class="btn btn-primary" style="width: 100%;" 
                                                        onclick="addIssueForDoc(${contractorId}, ${d.id}, '${d.docName.replace(/'/g, "\\'")}')">➕ ${currentLang === 'ru' ? 'Проблема' : 'Issue'}</button>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `).join('') || `<p style="text-align: center; padding: 20px;">${currentLang === 'ru' ? 'Нет комплектов для отображения' : 'No documents to display'}</p>`}
                </div>

                <!-- Проблемы подрядчика -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">⚠️ ${currentLang === 'ru' ? 'Проблемы' : 'Issues'} (${contractorIssues.length})</div>
                        <button class="btn btn-primary" onclick="openIssueModal(${c.id})">➕ ${currentLang === 'ru' ? 'Добавить проблему' : 'Add Issue'}</button>
                    </div>
                    ${contractorIssues.length > 0 ? renderIssuesTable(contractorIssues, true) : `<p style="text-align: center; padding: 20px;">${t('messages.noIssues')}</p>`}
                </div>
            `;
        }

        function updateReportDate(contractorId, date) {
            if (!contractorSettings[contractorId]) {
                contractorSettings[contractorId] = { docs: {}, weeklyReportDate: date };
            }
            contractorSettings[contractorId].weeklyReportDate = date;
            saveToStorage();
            render();
        }

        function updateDocSetting(contractorId, docId, field, value) {
            if (!contractorSettings[contractorId]) contractorSettings[contractorId] = { docs: {} };
            if (!contractorSettings[contractorId].docs[docId]) contractorSettings[contractorId].docs[docId] = {};
            contractorSettings[contractorId].docs[docId][field] = value;
            saveToStorage();
        }

        function updateDocProgress(contractorId, docId, value) {
            updateDocSetting(contractorId, docId, 'progress', parseInt(value) || 0);
            render();
        }

        function updateDocStatus(contractorId, docId, value) {
            updateDocSetting(contractorId, docId, 'isHold', value === 'HOLD');
            render();
        }

        function getDocProgress(docId) {
            for (const cId in contractorSettings) {
                if (contractorSettings[cId].docs[docId]?.progress !== undefined) {
                    return contractorSettings[cId].docs[docId].progress;
                }
            }
            const doc = aiDocs.find(d => d.id === docId);
            return doc?.progress || 0;
        }

        function isDocHold(docId) {
            for (const cId in contractorSettings) {
                if (contractorSettings[cId].docs[docId]?.isHold) return true;
            }
            return false;
        }

        // ========== ЭКСПОРТ В MS PROJECT ==========
        function exportToMSProject(contractorId) {
            const c = CONTRACTORS.find(x => x.id === contractorId);
            const docs = aiDocs.filter(d => d.contractorId === contractorId);
            
            if (docs.length === 0) {
                alert(currentLang === 'ru' ? 'Нет данных для экспорта' : 'No data to export');
                return;
            }

            // Формат XML для MS Project
            const xmlHeader = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Project xmlns="http://schemas.microsoft.com/project">
    <Name>${c.name} - ${new Date().toISOString().split('T')[0]}</Name>
    <Subject>Interior Design Project</Subject>
    <CreationDate>${new Date().toISOString()}</CreationDate>
    <LastSaved>${new Date().toISOString()}</LastSaved>
    <ScheduleFromStart>1</ScheduleFromStart>
    <StartDate>${new Date().toISOString().split('T')[0]}T08:00:00</StartDate>
    <DefaultStartTime>08:00:00</DefaultStartTime>
    <DefaultFinishTime>17:00:00</DefaultFinishTime>
    <MinutesPerDay>480</MinutesPerDay>
    <DaysPerMonth>20</DaysPerMonth>
    <MinutesPerWeek>2400</MinutesPerWeek>
    <StandardRate>0</StandardRate>
    <OvertimeRate>0</OvertimeRate>
    <CurrencySymbol>₽</CurrencySymbol>
    <CurrencyPosition>0</CurrencyPosition>
    <CurrencyDigits>2</CurrencyDigits>
    <Tasks>`;

            let tasksXml = '';
            let taskId = 1;
            let outlineLevel = 1;

            // Группировка по зонам
            const byZone = {};
            docs.forEach(d => {
                if (!byZone[d.zone]) byZone[d.zone] = [];
                byZone[d.zone].push(d);
            });

            // Создаем задачи по зонам и документам
            Object.entries(byZone).forEach(([zone, zoneDocs], zoneIndex) => {
                // Задача-контейнер для зоны
                const zoneStartDate = zoneDocs[0]?.startDate || new Date().toISOString().split('T')[0];
                
                tasksXml += `
        <Task>
            <UID>${taskId}</UID>
            <ID>${taskId}</ID>
            <Name>${escapeXml(zone)}</Name>
            <Type>1</Type>
            <IsNull>0</IsNull>
            <CreateDate>${new Date().toISOString()}</CreateDate>
            <WBS>${zoneIndex + 1}</WBS>
            <OutlineNumber>${zoneIndex + 1}</OutlineNumber>
            <OutlineLevel>1</OutlineLevel>
            <Priority>500</Priority>
            <Start>${zoneStartDate}T08:00:00</Start>
            <Finish>${calculateFinishDate(zoneStartDate, 30)}T17:00:00</Finish>
            <Duration>PT240H0M0S</Duration>
            <DurationFormat>7</DurationFormat>
            <PercentComplete>0</PercentComplete>
            <PercentWorkComplete>0</PercentWorkComplete>
            <FixedCostAccrual>2</FixedCostAccrual>
            <ConstraintType>0</ConstraintType>
            <Summary>1</Summary>
            <Critical>0</Critical>
            <Milestone>0</Milestone>
        </Task>`;
                
                taskId++;
                outlineLevel = 2;

                // Задачи для каждого документа
                zoneDocs.forEach((d, docIndex) => {
                    const settings = contractorSettings[contractorId]?.docs[d.id] || {};
                    const startDate = settings.startDate || d.startDate || new Date().toISOString().split('T')[0];
                    const plan30 = settings.plan30 || d.plan30;
                    const plan60 = settings.plan60 || d.plan60;
                    const plan90 = settings.plan90 || d.plan90;
                    const progress = settings.progress || 0;
                    
                    // Основная задача - документ
                    tasksXml += `
        <Task>
            <UID>${taskId}</UID>
            <ID>${taskId}</ID>
            <Name>${escapeXml(d.docName)}</Name>
            <Type>0</Type>
            <IsNull>0</IsNull>
            <CreateDate>${new Date().toISOString()}</CreateDate>
            <WBS>${zoneIndex + 1}.${docIndex + 1}</WBS>
            <OutlineNumber>${zoneIndex + 1}.${docIndex + 1}</OutlineNumber>
            <OutlineLevel>2</OutlineLevel>
            <Priority>500</Priority>
            <Start>${startDate}T08:00:00</Start>
            <Finish>${plan90 || calculateFinishDate(startDate, 90)}T17:00:00</Finish>
            <Duration>PT${Math.ceil(calculateDuration(startDate, plan90 || calculateFinishDate(startDate, 90)) * 8)}H0M0S</Duration>
            <DurationFormat>7</DurationFormat>
            <PercentComplete>${progress}</PercentComplete>
            <PercentWorkComplete>${progress}</PercentWorkComplete>
            <FixedCostAccrual>2</FixedCostAccrual>
            <ConstraintType>0</ConstraintType>
            <Summary>0</Summary>
            <Critical>${progress < 100 && new Date(plan90 || calculateFinishDate(startDate, 90)) < new Date() ? 1 : 0}</Critical>
            <Milestone>0</Milestone>
            <Notes>${escapeXml(d.docCode)} | ${escapeXml(d.zone)}</Notes>
        </Task>`;
                    
                    taskId++;
                    
                    // Подзадачи milestones 30%, 60%, 90%
                    const milestones = [
                        { level: 30, date: plan30, name: currentLang === 'ru' ? '30% готовности' : '30% Complete' },
                        { level: 60, date: plan60, name: currentLang === 'ru' ? '60% готовности' : '60% Complete' },
                        { level: 90, date: plan90, name: currentLang === 'ru' ? '90% готовности' : '90% Complete (Release)' }
                    ];
                    
                    milestones.forEach((m, mIndex) => {
                        if (m.date) {
                            tasksXml += `
        <Task>
            <UID>${taskId}</UID>
            <ID>${taskId}</ID>
            <Name>${escapeXml(m.name)}</Name>
            <Type>0</Type>
            <IsNull>0</IsNull>
            <CreateDate>${new Date().toISOString()}</CreateDate>
            <WBS>${zoneIndex + 1}.${docIndex + 1}.${mIndex + 1}</WBS>
            <OutlineNumber>${zoneIndex + 1}.${docIndex + 1}.${mIndex + 1}</OutlineNumber>
            <OutlineLevel>3</OutlineLevel>
            <Priority>500</Priority>
            <Start>${m.date}T08:00:00</Start>
            <Finish>${m.date}T17:00:00</Finish>
            <Duration>PT8H0M0S</Duration>
            <DurationFormat>7</DurationFormat>
            <PercentComplete>${progress >= m.level ? 100 : 0}</PercentComplete>
            <PercentWorkComplete>${progress >= m.level ? 100 : 0}</PercentWorkComplete>
            <FixedCostAccrual>2</FixedCostAccrual>
            <ConstraintType>0</ConstraintType>
            <Summary>0</Summary>
            <Critical>0</Critical>
            <Milestone>1</Milestone>
        </Task>`;
                            taskId++;
                        }
                    });
                });
            });

            const xmlFooter = `
    </Tasks>
    <Resources>
        <Resource>
            <UID>0</UID>
            <ID>0</ID>
            <Type>1</Type>
            <IsNull>0</IsNull>
            <MaxUnits>1.00</MaxUnits>

            <CanLevel>1</CanLevel>
            <AccrueAt>2</AccrueAt>
            <Cost>0.00</Cost>
        </Resource>
    </Resources>
</Project>`;

            const fullXml = xmlHeader + tasksXml + xmlFooter;
            
            // Скачивание файла
            const blob = new Blob([fullXml], { type: 'application/xml;charset=utf-8;' });
            const link = document.createElement('a');

                ? `Экспортировано ${taskId - 1} задач для ${c.name}` 
                : `Exported ${taskId - 1} tasks for ${c.name}`);

        function escapeXml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[<>&'"]/g, c => {
                switch (c) {
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '&': return '&amp;';
                    case '\'': return '&apos;';
                    case '"': return '&quot;';
                }
                return c;
            });
        }

        function calculateFinishDate(startDate, days) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + days);
            return date.toISOString().split('T')[0];
        }

        function calculateDuration(startDate, finishDate) {
            const start = new Date(startDate);
            const finish = new Date(finishDate);
            const diffTime = Math.abs(finish - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays || 1;
        }

                document.getElementById('changeInitiator').value = c.initiator;

        function saveChange(e) {
            e.preventDefault();
            
            const id = document.getElementById('changeId').value;
            const data = {
                number: parseInt(document.getElementById('changeNumber').value),
                category: document.getElementById('changeCategory').value,
                element: document.getElementById('changeElement').value,
                description: document.getElementById('changeDescription').value,
                initiator: document.getElementById('changeInitiator').value,
                requestDate: document.getElementById('changeRequestDate').value,
                status: document.getElementById('changeStatus').value,
                decisionMaker: document.getElementById('changeDecisionMaker').value,
                decisionDate: document.getElementById('changeDecisionDate').value,
                decision: document.getElementById('changeDecision').value,
                comments: document.getElementById('changeComments').value
            };
            
            if (id) {
                const idx = changes.findIndex(c => c.id === parseInt(id));
                changes[idx] = { ...changes[idx], ...data };
            } else {
                changes.push({ id: Date.now(), ...data });
            }
            
            saveToStorage();
            closeChangeModal();
            render();
        }

            if (confirm(currentLang === 'ru' ? 'Удалить запись?' : 'Delete record?')) {

            }

            const c = CONTRACTORS.find(x => x.id === contractorId);
            const modal = document.getElementById('issueModal');
            
            const prefix = c.shortName;
            const existing = issues.filter(i => i.id.startsWith(prefix + '-'));
            const maxNum = Math.max(0, ...existing.map(i => {
                const match = i.id.match(/-(\d+)$/);
                return match ? parseInt(match[1]) : 0;
            }));
            const newId = `${prefix}-${maxNum + 1}`;
            
            document.getElementById('issueContractorId').value = contractorId;
            document.getElementById('issueContractorName').value = c.name;
            document.getElementById('issueId').value = newId;
            document.getElementById('issueDocCode').value = docCode;

            document.getElementById('issueAffectedDoc').value = docCode ? `${docCode} - ${docName}` : (currentLang === 'ru' ? 'Общая проблема' : 'General Issue');

            if (['На рассмотрении', 'В работе', 'На согласовании', 'Pending', 'In Progress', 'Under Review'].includes(s)) return `<span class="badge badge-warning">${s}</span>`;

            const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });

            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();

                { classifier: 'BIM', desc: 'Можно ли менять шаблоны для видов, размещенных на листах в комплектах Р?', affectedDoc: 'МФЗ - Общее' },
                { classifier: 'BIM', desc: 'Можно ли удалять лишние материалы?', affectedDoc: 'МФЗ - Общее' },
                { classifier: 'Проектные решения', desc: 'Просим уточнить границу помещения сцены. Не понятно какой конфигурации перегородка', affectedDoc: 'МФЗ - Зона 4' },
                { classifier: 'Материалы', desc: 'В альбоме дизайна от авторов концепции отсутствует описание отделки WF-9', affectedDoc: 'МФЗ - Зона 4' }
            ];

            const contractor = CONTRACTORS.find(c => c.id === 3);
            let counter = 1;
            const existingFP = issues.filter(i => i.id.startsWith('FP-'));
            const maxNum = existingFP.reduce((max, i) => {
                const num = parseInt(i.id.split('-')[1]) || 0;
                return Math.max(max, num);
            }, 0);
            counter = maxNum + 1;

            const newIssues = fitOutIssues.map((issue, idx) => ({
                id: `FP-${counter + idx}`,
                contractorId: 3,
                contractorName: contractor.name,
                classifier: issue.classifier,
                affectedDoc: issue.affectedDoc,
                desc: issue.desc,
                date: '2026-03-12',
                dueDate: '2026-03-26',
                status: 'Новая',
                priority: 'Средний',
                comments: ''
            }));

            const existingDescs = new Set(issues.map(i => i.desc));
            const uniqueNewIssues = newIssues.filter(i => !existingDescs.has(i.desc));
            
            issues = [...issues, ...uniqueNewIssues];
            saveToStorage();
        }
    </script>
