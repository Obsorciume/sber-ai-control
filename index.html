<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СберКонтроль АИ | Управление проектом</title>
    <style>
        :root {
            --sber-green: #21A038;
            --sber-green-light: #E6F4EA;
            --sber-green-dark: #1A8330;
            --sber-gray: #F5F7FA;
            --sber-text: #333333;
            --sber-text-light: #6B7280;
            --sber-white: #FFFFFF;
            --sber-border: #E5E7EB;
            --sber-red: #EF4444;
            --sber-yellow: #F59E0B;
            --sber-blue: #3B82F6;
            --sber-orange: #F97316;
            --priority-1: #EF4444;
            --priority-2: #F59E0B;
            --priority-3: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sber-gray);
            color: var(--sber-text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: var(--sber-white);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
        }

        /* Шапка */
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--sber-green);
        }
        .logo-area { display: flex; align-items: center; gap: 16px; }
        .sber-logo {
            width: 48px; height: 48px;
            background: var(--sber-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }
        .sber-logo::after { content: "С"; font-family: serif; }
        .user-badge {
            background: var(--sber-green-light);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--sber-green-dark);
            font-weight: 600;
        }

        /* Синхронизация */
        .sync-panel {
            background: linear-gradient(135deg, var(--sber-green-light), white);
            border: 2px solid var(--sber-green);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-indicator {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--sber-green);
            display: inline-block;
            margin-right: 8px;
        }
        .sync-indicator.error { background: var(--sber-red); }
        .sync-indicator.syncing { background: var(--sber-yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--sber-gray);
            padding: 8px;
            border-radius: 12px;
        }
        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--sber-text-light);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .tab:hover { background: rgba(33, 160, 56, 0.1); color: var(--sber-green); }
        .tab.active { background: var(--sber-green); color: white; }
        .tab-badge {
            background: var(--sber-red);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Карточки */
        .card {
            background: var(--sber-white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--sber-border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--sber-border);
        }
        .card-title {
            color: var(--sber-text);
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--sber-green); color: white; }
        .btn-primary:hover { background: var(--sber-green-dark); }
        .btn-secondary { background: var(--sber-gray); color: var(--sber-text); border: 1px solid var(--sber-border); }
        .btn-danger { background: #FEE2E2; color: var(--sber-red); }

        /* Таблицы */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .data-table th {
            background: var(--sber-green-light);
            color: var(--sber-green-dark);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--sber-green);
            font-weight: 600;
        }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--sber-border); vertical-align: top; }
        .data-table tr:hover { background: var(--sber-gray); }

        /* Формы */
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--sber-border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9em;
            background: var(--sber-white);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--sber-green);
            box-shadow: 0 0 0 3px rgba(33, 160, 56, 0.1);
        }
        .form-textarea { min-height: 60px; resize: vertical; }

        /* Прогресс */
        .progress-container {
            height: 24px;
            background: var(--sber-gray);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--sber-green), var(--sber-green-dark));
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.8em;
        }

        /* Бейджи */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
            display: inline-block;
        }
        .badge-success { background: var(--sber-green-light); color: var(--sber-green-dark); }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-info { background: #DBEAFE; color: #1E40AF; }
        .badge-hold { background: #FEE2E2; color: #991B1B; font-weight: 600; border: 2px solid var(--sber-red); }

        /* Группировка MDR с чекбоксом */
        .mdr-contractor-group {
            margin-bottom: 16px;
            border: 1px solid var(--sber-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .mdr-contractor-header {
            background: var(--sber-green);
            color: white;
            padding: 12px 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .mdr-contractor-header:hover { background: var(--sber-green-dark); }
        .mdr-contractor-content {
            display: none;
            padding: 12px;
        }
        .mdr-contractor-content.expanded { display: block; }
        .toggle-icon { font-size: 1.2em; transition: transform 0.3s; }
        .toggle-icon.expanded { transform: rotate(90deg); }

        /* Контактная карточка подрядчика */
        .contact-card {
            background: linear-gradient(135deg, var(--sber-green-light), white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--sber-green);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        .contact-avatar {
            width: 60px; height: 60px;
            background: var(--sber-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .zones-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .zone-tag {
            background: white;
            border: 1px solid var(--sber-green);
            color: var(--sber-green-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        /* Отчет по контрольным датам */
        .weekly-report {
            background: var(--sber-green-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--sber-green);
        }
        .weekly-report h3 {
            margin-bottom: 16px;
            color: var(--sber-green-dark);
        }
        .date-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sber-green);
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--sber-text-light);
        }

        /* Фильтры */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Статистика дашборда */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--sber-white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--sber-border);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--sber-green);
            margin: 10px 0;
        }
        .stat-label {
            color: var(--sber-text-light);
            font-size: 0.9em;
        }

        /* Комплект в карточке подрядчика */
        .doc-card {
            border: 1px solid var(--sber-border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: white;
        }
        .doc-card.hold { background: #FEF2F2; border-color: var(--sber-red); }
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        .doc-title { font-weight: 600; margin-bottom: 4px; }
        .doc-code {
            font-family: monospace;
            color: var(--sber-text-light);
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .contact-card { grid-template-columns: 1fr; text-align: center; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Модальное окно изменений -->

        <div class="modal">
            <div class="modal-header">

                <button class="close-btn" onclick="closeChangeModal()">&times;</button>
            </div>
            <form id="changeForm" onsubmit="saveChange(event)">
                <input type="hidden" id="changeId">
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>№ записи</label>
                        <input type="number" id="changeNumber" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="changeCategory" class="form-select">
                            <option value="Сроки">Сроки</option>
                            <option value="Ресурсы">Ресурсы</option>
                            <option value="Бюджет">Бюджет</option>
                            <option value="Объем">Объем</option>
                            <option value="Качество">Качество</option>
                            <option value="Требования">Требования</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Элемент/Комплект</label>
                    <input type="text" id="changeElement" class="form-input">
                </div>
                <div class="form-group">
                    <label>Описание изменения</label>
                    <textarea id="changeDescription" class="form-textarea" required></textarea>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Инициатор</label>
                        <input type="text" id="changeInitiator" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Дата запроса</label>
                        <input type="date" id="changeRequestDate" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="changeStatus" class="form-select">
                        <option value="На рассмотрении">На рассмотрении</option>
                        <option value="Внесено">Внесено</option>
                        <option value="Одобрено">Одобрено</option>
                        <option value="Отклонено">Отклонено</option>
                        <option value="Отложено">Отложено</option>
                    </select>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Решение принял</label>
                        <input type="text" id="changeDecisionMaker" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Дата решения</label>
                        <input type="date" id="changeDecisionDate" class="form-input">

                <div class="form-group">
                    <label>Решение/Комментарий</label>
                    <textarea id="changeDecision" class="form-textarea"></textarea>

                <div class="form-group">
                    <label>Комментарии</label>
                    <textarea id="changeComments" class="form-textarea" placeholder="Дополнительные комментарии..."></textarea>

                    <button type="button" class="btn btn-secondary" onclick="closeChangeModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно проблемы -->
    <div id="issueModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">⚠️ Новая проблема</div>
                <button class="close-btn" onclick="closeIssueModal()">&times;</button>
            </div>
            <form id="issueForm" onsubmit="saveIssue(event)">
                <input type="hidden" id="issueContractorId">
                <input type="hidden" id="issueDocCode">
                <input type="hidden" id="issueDocName">
                
                <div class="form-group">
                    <label>ID проблемы</label>
                    <input type="text" id="issueId" class="form-input" readonly style="background: var(--sber-gray);">
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Подрядчик</label>
                        <input type="text" id="issueContractorName" class="form-input" readonly style="background: var(--sber-gray);">
                    </div>
                    <div class="form-group">
                        <label>Классификатор</label>
                        <select id="issueClassifier" class="form-select" required>
                            <option value="">Выберите...</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Влияет на комплект</label>
                    <input type="text" id="issueAffectedDoc" class="form-input" readonly style="background: var(--sber-gray);">
                </div>
                
                <div class="form-group">
                    <label>Описание проблемы</label>
                    <textarea id="issueDesc" class="form-textarea" required></textarea>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Дата выявления</label>
                        <input type="date" id="issueDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Срок решения</label>
                        <input type="date" id="issueDueDate" class="form-input" required>
                    </div>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="issueStatus" class="form-select">
                            <option value="Новая">Новая</option>
                            <option value="В работе">В работе</option>
                            <option value="Требует решения">Требует решения</option>
                            <option value="На согласовании">На согласовании</option>
                            <option value="Решено">Решено</option>
                            <option value="Отменено">Отменено</option>
                            <option value="Отложено">Отложено</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Приоритет</label>
                        <select id="issuePriority" class="form-select">
                            <option value="Критический">🔴 Критический</option>
                            <option value="Высокий">🟡 Высокий</option>
                            <option value="Средний" selected>🟢 Средний</option>
                            <option value="Низкий">🔵 Низкий</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Комментарии</label>
                    <textarea id="issueComments" class="form-textarea" placeholder="Дополнительные комментарии..."></textarea>
                </div>
                
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeIssueModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

            // Инициализация настроек подрядчиков
            CONTRACTORS.forEach(c => {

async function loadMDRFromSheets() {
    // УВЕЛИЧИЛИ ДИАПАЗОН до 5000 строк
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${CONFIG.MDR_RANGE}?key=${CONFIG.API_KEY}`;
    
    console.log('Загрузка из Google Sheets...');
    
    const response = await fetch(url);
    if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const data = await response.json();
    const rows = data.values || [];
    
    console.log('Всего строк в таблице:', rows.length);
    
    if (rows.length < 3) {
        throw new Error('Недостаточно данных в таблице');
    }

    mdrData = [];
    aiDocs = [];
    
    // Парсим начиная со строки 3 (индекс 2) — пропускаем 2 заголовка
    for (let i = 2; i < rows.length; i++) {
        const row = rows[i];
        
        // Пропускаем пустые строки
        if (!row || row.length === 0) continue;
        
        const zone = (row[0] || '').toString().trim();
        const discipline = (row[1] || '').toString().trim();
        const docCode = (row[4] || '').toString().trim();
        const docName = (row[5] || '').toString().trim();
        const intermediateStatus = row[11] ? row[11].toString().trim() : '';
        const finalStatus = row[12] ? row[12].toString().trim() : '';
        
        // ГИБКАЯ ПРОВЕРКА: АИ может быть в колонке B ИЛИ в шифре документа (E)
        const isAI = discipline.toUpperCase().includes('АИ') || 
                     discipline.toUpperCase().includes('AI') ||
                     docCode.toUpperCase().includes('АИ') ||
                     docCode.toUpperCase().includes('AI');
        
        // Определяем подрядчика по зоне
        const contractor = findContractor(zone);
        
        const doc = {
            id: i,
            zone: zone,
            discipline: discipline,
            docCode: docCode,
            docName: docName,
            intermediateStatus: intermediateStatus,
            finalStatus: finalStatus,
            contractorId: contractor?.id,
            contractorName: contractor?.name || 'Не определен',
            isAI: isAI
        };
        
        mdrData.push(doc);
        
        // Если это АИ и есть подрядчик — добавляем в список подрядчика
        if (isAI && contractor) {
            aiDocs.push(doc);
        }
    }
    
    console.log(`Загружено: ${mdrData.length} всего, ${aiDocs.length} АИ с подрядчиком`);
    
    // Если нет АИ — демо-данные
    if (aiDocs.length === 0) {
        console.warn('АИ не найдены, загружаем демо');
        loadDemoAIDocs();
    }
}

        function findContractor(zone) {
            if (!zone) return null;
            const z = zone.toLowerCase();
            
            if (z.includes('банк') || z.includes('офис') || z.includes('столовая') || z.includes('ресторан') || z.includes('атриум') || z.includes('моп')) {
                return CONTRACTORS[0];
            }
            if (z.includes('мфз')) return CONTRACTORS[1];
            if (z.includes('визитор')) return CONTRACTORS[2];
            if (z.includes('медиа') || z.includes('кровля') || z.includes('терраса')) return CONTRACTORS[3];
            if (z.includes('спорт')) return CONTRACTORS[4];
            
            return null;
        }

            });

            const weekLater = new Date(reportDate);
            weekLater.setDate(weekLater.getDate() + 7);
            
            // Комплекты на ближайшую неделю
            const upcomingDocs = docs.filter(d => {
                const settings = contractorSettings[contractorId]?.docs[d.id];

                if (!planDate) return false;
                const plan = new Date(planDate);
                return plan >= new Date(reportDate) && plan <= weekLater;
            }).sort((a, b) => {
                const dateA = new Date(contractorSettings[contractorId]?.docs[a.id]?.plan90 || a.plan90);
                const dateB = new Date(contractorSettings[contractorId]?.docs[b.id]?.plan90 || b.plan90);

                <!-- Все комплекты подрядчика -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📋 Все комплекты (${docs.length})</div>

                    ${Object.entries(byZone).map(([zone, zoneDocs]) => `
                        <div style="margin-bottom: 20px;">

                                    return `

                                            <div class="doc-header">
                                                <div>
                                                    <div class="doc-title">${d.docName}</div>
                                                    <div class="doc-code">${d.docCode}</div>

                                                <span class="badge badge-info">${d.tom || 'Том 1'} / ${d.book || 'Книга 1'}</span>

                                            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; font-size: 0.85em;">
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">Начало</label>
                                                    <input type="date" class="form-input" value="${settings.startDate || d.startDate || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'startDate', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">30% план</label>
                                                    <input type="date" class="form-input" value="${settings.plan30 || d.plan30 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan30', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">60% план</label>
                                                    <input type="date" class="form-input" value="${settings.plan60 || d.plan60 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan60', this.value)">
                                                </div>
                                                <div>
                                                    <label style="color: var(--sber-text-light); display: block; margin-bottom: 4px;">90% план</label>
                                                    <input type="date" class="form-input" value="${settings.plan90 || d.plan90 || ''}" 
                                                        onchange="updateDocSetting(${contractorId}, ${d.id}, 'plan90', this.value)">
                                                </div>
                                            </div>
                                            
                                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; align-items: end;">
                                                <div>
                                                    <label style="color: var(--sber-text-light); font-size: 0.8em; display: block; margin-bottom: 4px;">% готовности</label>
                                                    <input type="number" class="form-input" min="0" max="100" value="${progress}" 
                                                        onchange="updateDocProgress(${contractorId}, ${d.id}, this.value)">

                                                <div>
                                                    <label style="color: var(--sber-text-light); font-size: 0.8em; display: block; margin-bottom: 4px;">Статус</label>

                                                </div>
                                                <div></div>

                                                    <button class="btn btn-primary" style="width: 100%;"

                <!-- Проблемы подрядчика -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">⚠️ Проблемы (${contractorIssues.length})</div>
                        <button class="btn btn-primary" onclick="openIssueModal(${c.id})">➕ Добавить проблему</button>
                    </div>

        function updateReportDate(contractorId, date) {
            if (!contractorSettings[contractorId]) {
                contractorSettings[contractorId] = { docs: {}, weeklyReportDate: date };
            }
            contractorSettings[contractorId].weeklyReportDate = date;
            saveToStorage();
            render();
        }

        function updateDocSetting(contractorId, docId, field, value) {
            if (!contractorSettings[contractorId]) contractorSettings[contractorId] = { docs: {} };
            if (!contractorSettings[contractorId].docs[docId]) contractorSettings[contractorId].docs[docId] = {};
            contractorSettings[contractorId].docs[docId][field] = value;
            saveToStorage();
        }

        function updateDocProgress(contractorId, docId, value) {
            updateDocSetting(contractorId, docId, 'progress', parseInt(value) || 0);
            render();
        }

        function updateDocStatus(contractorId, docId, value) {
            updateDocSetting(contractorId, docId, 'isHold', value === 'HOLD');
            render();
        }

        function getDocProgress(docId) {
            for (const cId in contractorSettings) {
                if (contractorSettings[cId].docs[docId]?.progress !== undefined) {
                    return contractorSettings[cId].docs[docId].progress;
                }
            }
            // Ищем в aiDocs
            const doc = aiDocs.find(d => d.id === docId);
            return doc?.progress || 0;
        }

        function isDocHold(docId) {
            for (const cId in contractorSettings) {
                if (contractorSettings[cId].docs[docId]?.isHold) return true;
            }
            return false;
        }

        // ========== 8. ЖУРНАЛ ИЗМЕНЕНИЙ ==========
        function renderChanges() {
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📝 Журнал изменений (${changes.length})</div>
                        <button class="btn btn-primary" onclick="openChangeModal()">➕ Добавить запись</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>№</th>
                                    <th>Категория</th>
                                    <th>Элемент</th>
                                    <th>Описание</th>
                                    <th>Инициатор</th>
                                    <th>Дата</th>
                                    <th>Статус</th>
                                    <th>Комментарии</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${changes.map(c => `
                                    <tr>
                                        <td><strong>${c.number}</strong></td>
                                        <td><span class="badge badge-info">${c.category}</span></td>
                                        <td>${c.element || '—'}</td>
                                        <td style="max-width: 200px;">${c.description}</td>
                                        <td>${c.initiator}</td>
                                        <td>${formatDate(c.requestDate)}</td>
                                        <td>${renderStatusBadge(c.status)}</td>
                                        <td>
                                            <div class="editable-cell" onclick="editChangeComment(${c.id})" title="Кликните для редактирования">
                                                ${c.comments || '—'}
                                            </div>
                                        </td>
                                        <td>
                                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8em;" onclick="openChangeModal(${c.id})">✏️</button>
                                            <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8em;" onclick="deleteChange(${c.id})">🗑️</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function editChangeComment(id) {
            const change = changes.find(c => c.id === id);
            if (!change) return;
            
            const newComment = prompt('Введите комментарий:', change.comments || '');
            if (newComment !== null) {
                change.comments = newComment;
                saveToStorage();
                render();
            }
        }

        // ========== 9. ЖУРНАЛ ПРОБЛЕМ ==========
        function renderIssues() {
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">⚠️ Реестр проблем (${issues.length})</div>
                        <div>
                            <button class="btn btn-primary" onclick="addIssuePrompt()">➕ Добавить проблему</button>
                            <button class="btn btn-secondary" onclick="exportIssues()">📤 Выгрузить</button>
                        </div>
                    </div>
                    ${renderIssuesTable(issues)}
                </div>
            `;
        }

        function renderIssuesTable(issuesList) {
            return `
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Подрядчик</th>
                                <th>Классификатор</th>
                                <th>Влияет на</th>
                                <th>Описание</th>
                                <th>Дата</th>
                                <th>Срок</th>
                                <th>Статус</th>
                                <th>Приоритет</th>
                                <th>Комментарии</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${issuesList.map(i => `
                                <tr>
                                    <td><strong style="color: var(--sber-green); font-size: 1.1em;">${i.id}</strong></td>
                                    <td><strong>${i.contractorName}</strong></td>
                                    <td><span class="badge badge-info">${i.classifier}</span></td>
                                    <td style="font-size: 0.85em; max-width: 150px;">${i.affectedDoc || '—'}</td>

                                    <td>${formatDate(i.date)}</td>
                                    <td><strong>${formatDate(i.dueDate)}</strong></td>
                                    <td>
                                        <select class="form-select" onchange="updateIssueStatus('${i.id}', this.value)" style="font-size: 0.85em; min-width: 120px;">
                                            ${['Новая', 'В работе', 'Требует решения', 'На согласовании', 'Решено', 'Отменено', 'Отложено']
                                                .map(s => `<option value="${s}" ${i.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                        </select>
                                    </td>
                                    <td>
                                        <select class="form-select" onchange="updateIssuePriority('${i.id}', this.value)" style="font-size: 0.85em; min-width: 100px;">
                                            ${['Критический', 'Высокий', 'Средний', 'Низкий']

                                    <td>

        function editIssueComment(id) {
            const issue = issues.find(i => i.id === id);
            if (!issue) return;
            
            const newComment = prompt('Введите комментарий:', issue.comments || '');
            if (newComment !== null) {
                issue.comments = newComment;
                saveToStorage();
                render();
            }
        }

        // ========== МОДАЛЬНЫЕ ОКНА И ДЕЙСТВИЯ ==========
        function openChangeModal(id = null) {
            const modal = document.getElementById('changeModal');
            
            if (id) {
                const c = changes.find(x => x.id === id);
                document.getElementById('changeId').value = c.id;
                document.getElementById('changeNumber').value = c.number;
                document.getElementById('changeCategory').value = c.category;
                document.getElementById('changeElement').value = c.element || '';
                document.getElementById('changeDescription').value = c.description;
                document.getElementById('changeInitiator').value = c.initiator;
                document.getElementById('changeRequestDate').value = c.requestDate;
                document.getElementById('changeStatus').value = c.status;
                document.getElementById('changeDecisionMaker').value = c.decisionMaker || '';
                document.getElementById('changeDecisionDate').value = c.decisionDate || '';
                document.getElementById('changeDecision').value = c.decision || '';
                document.getElementById('changeComments').value = c.comments || '';
            } else {
                document.getElementById('changeForm').reset();
                document.getElementById('changeId').value = '';
                document.getElementById('changeNumber').value = (Math.max(0, ...changes.map(c => c.number)) + 1);
                document.getElementById('changeRequestDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('changeStatus').value = 'На рассмотрении';
            }
            
            modal.classList.add('active');
        }

        function closeChangeModal() {
            document.getElementById('changeModal').classList.remove('active');
        }

        function saveChange(e) {
            e.preventDefault();
            
            const id = document.getElementById('changeId').value;
            const data = {
                number: parseInt(document.getElementById('changeNumber').value),
                category: document.getElementById('changeCategory').value,
                element: document.getElementById('changeElement').value,
                description: document.getElementById('changeDescription').value,
                initiator: document.getElementById('changeInitiator').value,
                requestDate: document.getElementById('changeRequestDate').value,
                status: document.getElementById('changeStatus').value,
                decisionMaker: document.getElementById('changeDecisionMaker').value,
                decisionDate: document.getElementById('changeDecisionDate').value,
                decision: document.getElementById('changeDecision').value,
                comments: document.getElementById('changeComments').value
            };
            
            if (id) {
                const idx = changes.findIndex(c => c.id === parseInt(id));
                changes[idx] = { ...changes[idx], ...data };
            } else {
                changes.push({ id: Date.now(), ...data });
            }
            
            saveToStorage();
            closeChangeModal();
            render();
        }

        function deleteChange(id) {
            if (confirm('Удалить запись?')) {
                changes = changes.filter(c => c.id !== id);
                saveToStorage();
                render();
            }
        }

        // ========== ПРОБЛЕМЫ - ДЕЙСТВИЯ ==========
        function openIssueModal(contractorId, docCode = '', docName = '') {
            const c = CONTRACTORS.find(x => x.id === contractorId);
            const modal = document.getElementById('issueModal');
            
            // Генерация ID
            const prefix = c.shortName;
            const existing = issues.filter(i => i.id.startsWith(prefix + '-'));
            const maxNum = Math.max(0, ...existing.map(i => {
                const match = i.id.match(/-(\d+)$/);
                return match ? parseInt(match[1]) : 0;
            }));
            const newId = `${prefix}-${maxNum + 1}`;
            
            document.getElementById('issueContractorId').value = contractorId;
            document.getElementById('issueContractorName').value = c.name;
            document.getElementById('issueId').value = newId;
            document.getElementById('issueDocCode').value = docCode;
            document.getElementById('issueDocName').value = docName;
            document.getElementById('issueAffectedDoc').value = docCode ? `${docCode} - ${docName}` : 'Общая проблема';
            document.getElementById('issueDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('issueDueDate').value = new Date(Date.now() + 14*24*60*60*1000).toISOString().split('T')[0];
            document.getElementById('issueDesc').value = '';
            document.getElementById('issueComments').value = '';
            
            // Сброс классификатора
            document.getElementById('issueClassifier').value = '';
            
            modal.classList.add('active');
        }

        function closeIssueModal() {
            document.getElementById('issueModal').classList.remove('active');
        }

        function saveIssue(e) {
            e.preventDefault();
            
            const contractorId = parseInt(document.getElementById('issueContractorId').value);
            const c = CONTRACTORS.find(x => x.id === contractorId);
            
            const newIssue = {
                id: document.getElementById('issueId').value,
                contractorId: contractorId,
                contractorName: c.name,
                classifier: document.getElementById('issueClassifier').value,
                affectedDoc: document.getElementById('issueAffectedDoc').value,
                desc: document.getElementById('issueDesc').value,
                date: document.getElementById('issueDate').value,
                dueDate: document.getElementById('issueDueDate').value,
                status: document.getElementById('issueStatus').value,
                priority: document.getElementById('issuePriority').value,
                comments: document.getElementById('issueComments').value
            };
            
            issues.push(newIssue);
            saveToStorage();
            closeIssueModal();
            render();
        }

        function addIssueForDoc(contractorId, docId, docName) {
            // Находим docCode по id
            const doc = aiDocs.find(d => d.id === docId);
            const docCode = doc ? doc.docCode : '';
            openIssueModal(contractorId, docCode, docName);
        }

        function addIssuePrompt() {
            const contractorName = prompt('Выберите подрядчика:\n' + CONTRACTORS.map((c, i) => `${i + 1}. ${c.name}`).join('\n') + '\n\nВведите номер:');
            if (!contractorName) return;
            
            const idx = parseInt(contractorName) - 1;
            if (idx >= 0 && idx < CONTRACTORS.length) {
                openIssueModal(CONTRACTORS[idx].id);
            } else {
                alert('Неверный выбор');
            }
        }

        function updateIssueStatus(id, status) {
            const i = issues.find(x => x.id === id);
            if (i) {
                i.status = status;
                saveToStorage();
                render();
            }
        }

        function updateIssuePriority(id, priority) {
            const i = issues.find(x => x.id === id);
            if (i) {
                i.priority = priority;
                saveToStorage();
                render();
            }
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function formatDate(d) {
            if (!d) return '—';
            const date = new Date(d);
            return isNaN(date) ? d : date.toLocaleDateString('ru-RU');
        }

        function renderStatusBadge(s) {
            if (['Решено', 'Одобрено', 'Внесено'].includes(s)) return `<span class="badge badge-success">${s}</span>`;
            if (['На рассмотрении', 'В работе', 'На согласовании'].includes(s)) return `<span class="badge badge-warning">${s}</span>`;
            if (['Отклонено', 'Отменено'].includes(s)) return `<span class="badge badge-danger">${s}</span>`;
            return `<span class="badge badge-info">${s}</span>`;
        }

        // ========== ЭКСПОРТ ==========
        function exportMDR() {
            let csv = 'Подрядчик;Зона;Шифр раздела;Шифр документа;Наименование;План 30%;План 60%;План 90%;Прогресс;Статус\n';
            
            aiDocs.forEach(d => {
                const settings = contractorSettings[d.contractorId]?.docs[d.id] || {};
                csv += `${d.contractorName};${d.zone};${d.discipline};${d.docCode};"${d.docName}";${settings.plan30 || d.plan30 || ''};${settings.plan60 || d.plan60 || ''};${settings.plan90 || d.plan90 || ''};${settings.progress || 0}%;${settings.isHold ? 'HOLD' : 'В работе'}\n`;
            });
            
            // Добавляем не-АИ документы
            mdrData.filter(d => !d.isAI).forEach(d => {
                csv += `${d.contractorName || 'Прочие'};${d.zone};${d.discipline};${d.docCode};"${d.docName}";—;—;—;—;${d.finalStatus || ''}\n`;
            });
            
            downloadCSV(csv, `MDR_${new Date().toISOString().split('T')[0]}.csv`);
        }

        function exportIssues() {
            let csv = 'ID;Подрядчик;Классификатор;Влияет на;Описание;Дата выявления;Срок решения;Статус;Приоритет;Комментарии\n';
            
            issues.forEach(i => {
                csv += `${i.id};${i.contractorName};${i.classifier};"${i.affectedDoc || ''}";"${i.desc}";${i.date};${i.dueDate};${i.status};${i.priority};"${i.comments || ''}"\n`;
            });
            
            downloadCSV(csv, `Проблемы_${new Date().toISOString().split('T')[0]}.csv`);
        }

        function downloadCSV(content, filename) {
            const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        // ========== ДЕМО-ДАННЫЕ FITOUT PRO ==========
        function loadFitOutProDemoIssues() {
            // Проблемы из PDF файла K32SB_мфз_фитаутпро_2026.03.12.pdf
            const fitOutIssues = [
                { classifier: 'BIM', desc: 'В модели есть и помещения и пространства. На основе чего следует формировать экспликации?', affectedDoc: 'МФЗ - Общее' },
